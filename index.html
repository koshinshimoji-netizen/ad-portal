<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD事業理解ポータル</title>
<style>
:root {
  --bg: #f5f5f2;
  --surface: #fff;
  --border: #e4e4e0;
  --text: #111;
  --muted: #888;
  --c0: #2563eb;
  --c1: #7c3aed;
  --c2: #059669;
  --c3: #ea580c;
  --c4: #dc2626;
  --c5: #0891b2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
.shell { max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; }

/* top bar */
.top-bar { display: flex; align-items: center; margin-bottom: 36px; }
.logo { font-weight: 800; font-size: 15px; }
.logo span { color: var(--c0); }
.back-btn {
  display: none; align-items: center; gap: 5px;
  font-size: 13px; color: var(--muted); cursor: pointer;
  border: none; background: none; padding: 0; margin-right: auto;
}
.back-btn:hover { color: var(--text); }

/* breadcrumbs */
.breadcrumbs {
  display: none; flex-wrap: wrap; gap: 4px; align-items: center;
  margin-bottom: 20px; font-size: 12px; color: var(--muted);
}
.breadcrumbs.visible { display: flex; }
.bc-item { background: var(--border); padding: 2px 8px; border-radius: 20px; color: #555; font-size: 11px; }
.bc-sep { color: var(--border); }

/* prompt */
.prompt { margin-bottom: 24px; }
.prompt h2 { font-size: 22px; font-weight: 800; line-height: 1.35; margin-bottom: 6px; }
.prompt p { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* cards */
.cards { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 14px;
}
.card:hover { border-color: #bbb; box-shadow: 0 2px 10px rgba(0,0,0,.07); transform: translateY(-1px); }
.card-icon { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }
.card-body { flex: 1; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.card-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
.card-tag {
  display: inline-block; font-size: 10px; font-weight: 700; color: var(--muted);
  background: var(--bg); border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 4px; margin-bottom: 3px;
}
.card-color-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
.chevron { color: var(--muted); flex-shrink: 0; }

/* result */
.result-q { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
.domain-results { display: flex; flex-direction: column; gap: 10px; }

.dr-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
.dr-top {
  padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
}
.dr-top:hover { background: #fafaf8; }
.dr-score {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800;
}
.score-main  { color: #fff; }
.score-sub   { background: transparent !important; border: 2.5px solid; }
.score-opt   { background: transparent !important; border: 2px dashed; opacity:.65; font-size:12px; }
.dr-meta { flex: 1; }
.dr-name { font-size: 14px; font-weight: 700; }
.dr-level { font-size: 11px; color: var(--muted); margin-top: 1px; }
.dr-chev { color: var(--muted); transition: transform .2s; flex-shrink:0; }
.dr-chev.open { transform: rotate(180deg); }

.dr-body { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
.dr-body.open { display: block; }
.dr-section { margin-top: 12px; }
.dr-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.dr-text { font-size: 13px; color: #333; line-height: 1.65; }
.dr-domain-link { display: block; width: 100%; margin-top: 12px; padding: 8px 12px; border-radius: 8px; border: 1px solid; font-size: 12px; font-weight: 600; cursor: pointer; text-align: left; }

.restart-btn {
  display: flex; align-items: center; gap: 7px; margin-top: 28px;
  font-size: 13px; color: var(--muted); cursor: pointer;
  background: none; border: none; padding: 0;
}
.restart-btn:hover { color: var(--text); }

/* domain index cards */
.domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.domain-index-card {
  border-radius: 12px; padding: 16px; cursor: pointer;
  transition: opacity .15s; color: #fff;
}
.domain-index-card:hover { opacity: .88; }
.dic-name { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
.dic-desc { font-size: 11px; opacity: .88; line-height: 1.5; }

/* phase index */
.phase-index-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px; cursor: pointer;
  transition: all .15s; display: flex; align-items: center; gap: 12px;
}
.phase-index-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.pic-tag { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
.pic-name { font-size: 14px; font-weight: 700; }
.pic-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.pic-roles { display: flex; gap: 4px; margin-top: 6px; }
.pic-role-badge { font-size: 10px; background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: #666; }

/* domain detail view */
.domain-detail-header {
  border-radius: 12px; padding: 18px 20px; color: #fff; margin-bottom: 20px;
}
.ddh-name { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.ddh-desc { font-size: 13px; opacity: .9; line-height: 1.6; }

.when-useful { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.wu-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.wu-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 13px; align-items: baseline; }
.wu-row:last-child { margin-bottom: 0; }
.wu-phase { font-weight: 700; min-width: 80px; flex-shrink: 0; font-size: 12px; }
.wu-score { flex-shrink: 0; font-size: 13px; font-weight: 700; min-width: 20px; }
.wu-note { color: #555; line-height: 1.5; font-size: 12px; }

/* domain section blocks */
.domain-section { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.domain-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; padding-left: 8px; border-left: 3px solid; }
.challenge-list { display: flex; flex-direction: column; gap: 10px; }
.challenge-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.challenge-problem, .challenge-solution { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; line-height: 1.6; }
.challenge-problem { color: #444; }
.challenge-solution { color: #333; font-weight: 500; }
.challenge-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
.challenge-badge-problem { background: #f3f4f6; color: #666; }
.challenge-badge-solution { color: #fff; }
.approach-list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
.approach-item { display: flex; gap: 10px; font-size: 13px; color: #444; line-height: 1.5; align-items: flex-start; }
.approach-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.case-cards { display: flex; flex-direction: column; gap: 10px; }
.case-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.case-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.case-company { font-size: 13px; font-weight: 700; color: var(--text); }
.case-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.case-summary { font-size: 12px; color: #555; line-height: 1.6; }

.section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

.fade { animation: fadeUp .18s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── BASICS ─── */
.phase-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 22px; scrollbar-width: none; }
.phase-tabs::-webkit-scrollbar { display: none; }
.phase-tab {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  background: var(--border); color: var(--muted); border: none; transition: all .15s;
}
.phase-tab.active { background: var(--text); color: #fff; }
.phase-tab:hover:not(.active) { background: #ddd; color: var(--text); }

.bph-phase { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.bph-name { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
.bph-desc { font-size: 13px; color: #444; line-height: 1.65; margin-bottom: 14px; }
.bph-focus {
  background: #f0f0ec; border-radius: 8px; padding: 11px 14px;
  font-size: 12px; color: #555; line-height: 1.55; margin-bottom: 22px;
}
.bph-focus strong { color: var(--text); display: block; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }

.b-section-label { font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

/* Misconception cards */
.myth-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
.myth-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; }
.myth-top { padding: 11px 14px; display: flex; align-items: flex-start; gap: 10px; }
.myth-top:hover { background: #fafaf8; }
.myth-badge { flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-top: 2px; }
.myth-text { font-size: 13px; line-height: 1.5; flex: 1; }
.myth-body { display: none; padding: 0 14px 12px; border-top: 1px solid var(--border); }
.myth-body.open { display: block; }
.myth-row { display: flex; gap: 8px; margin-top: 10px; align-items: flex-start; }
.myth-row-badge { flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-top: 2px;
  background: #dcfce7; color: #16a34a; }
.myth-row-text { font-size: 12px; color: #444; line-height: 1.6; }

/* Concept chips */
.concept-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
.concept-chip {
  font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text); transition: all .15s;
}
.concept-chip:hover { border-color: var(--text); background: var(--bg); }

/* Dictionary modal */
.dict-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 200; align-items: flex-end; justify-content: center;
}
.dict-overlay.open { display: flex; }
.dict-modal {
  background: var(--surface); border-radius: 16px 16px 0 0;
  padding: 24px 20px 48px; width: 100%; max-width: 680px;
  max-height: 65vh; overflow-y: auto;
}
.dict-modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.dict-modal-term { font-size: 18px; font-weight: 800; }
.dict-modal-close { font-size: 22px; cursor: pointer; color: var(--muted); border: none; background: none; padding: 0; line-height: 1; }
.dict-modal-def { font-size: 13px; color: #333; line-height: 1.7; margin-bottom: 14px; }
.dict-modal-eg { font-size: 12px; color: #555; background: var(--bg); border-radius: 8px; padding: 10px 14px; line-height: 1.6; }
.dict-modal-eg strong { color: var(--muted); display: block; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }

/* steps dots */
.steps { display: flex; gap: 5px; align-items: center; margin-bottom: 28px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all .2s; }
.step-dot.done { background: var(--text); }
.step-dot.active { background: var(--text); width: 22px; border-radius: 4px; }
.step-label { font-size: 11px; color: var(--muted); margin-left: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }

/* ── フェーズタイムライン ── */
.phase-timeline {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.phase-cell {
  flex: 1;
  min-width: 56px;
  text-align: center;
  padding: 8px 4px;
  border-radius: 8px;
  background: #f5f5f5;
}
.phase-cell--active {
  background: #fff;
  border: 1px solid #e0e0e0;
}
.phase-score {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.2;
}
.phase-label {
  font-size: 10px;
  color: #888;
  margin-top: 3px;
  line-height: 1.3;
}

/* ── チャレンジカード ── */
.chal-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chal-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  padding: 12px 14px;
}
.chal-problem {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 13px;
  color: #333;
}
.chal-divider {
  border-top: 1px dashed;
  margin: 10px 0;
}
.chal-solution {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 13px;
  color: #333;
}
.chal-icon {
  flex-shrink: 0;
  font-size: 13px;
  color: #e57373;
  margin-top: 1px;
}
.chal-icon--sol {
  background: #333;
  color: #fff;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-style: normal;
}

/* ── アプローチグループタイル ── */
.ag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
}
.ag-tile {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  padding: 12px 14px;
}
.ag-tile-head {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 8px;
}
.ag-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}
.ag-icon svg {
  width: 18px;
  height: 18px;
}
.ag-name {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.ag-items {
  list-style: none;
  padding: 0;
  margin: 0;
}
.ag-items li {
  font-size: 11px;
  color: #555;
  padding: 4px 0;
  border-top: 1px solid #f0f0f0;
  line-height: 1.5;
}
.ag-items li:first-child {
  border-top: none;
}
.ag-tile { cursor: pointer; }
.ag-count {
  font-size: 10px;
  color: #aaa;
  background: #f0f0f0;
  border-radius: 10px;
  padding: 1px 6px;
  margin-left: 2px;
}
.ag-chevron {
  width: 14px;
  height: 14px;
  margin-left: auto;
  color: #bbb;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.ag-tile--open .ag-chevron { transform: rotate(180deg); }
.ag-expand {
  display: none;
  border-top: 1px solid #f0f0f0;
  margin-top: 8px;
  padding-top: 10px;
}
.ag-tile--open .ag-expand { display: block; }
.ag-full-item {
  display: flex;
  gap: 8px;
  padding: 6px 0;
  border-top: 1px solid #f5f5f5;
  font-size: 12px;
  color: #444;
  line-height: 1.55;
}
.ag-full-item:first-child { border-top: none; }
.ag-full-num {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  background: #f0f0f0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #888;
}
.ag-full-text { flex: 1; }
.ag-expand-cases {
  margin-top: 10px;
  background: #fafaf8;
  border-radius: 8px;
  padding: 10px 12px;
}
.ag-expand-cases-label {
  font-size: 10px;
  font-weight: 700;
  color: #aaa;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.ag-case-item {
  padding: 7px 0;
  border-top: 1px solid #eee;
}
.ag-case-item:first-child { border-top: none; }
.ag-case-company {
  font-size: 12px;
  font-weight: 700;
  color: #333;
  display: block;
  margin-bottom: 3px;
}
.ag-case-summary {
  font-size: 11px;
  color: #666;
  line-height: 1.55;
  display: block;
}
.ag-case-link {
  font-size: 11px;
  font-weight: 600;
  text-decoration: none;
  display: inline-block;
  margin-top: 4px;
}

/* ── 課題→解決 2列テーブル ── */
.chal-table { display: flex; flex-direction: column; gap: 6px; }
.chal-table-head { display: grid; grid-template-columns: 1fr 28px 1fr; }
.chal-th-prob, .chal-th-sol {
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  padding: 0 10px 6px; color: #aaa;
}
.chal-th-sol { text-align: left; }
.chal-row { display: grid; grid-template-columns: 1fr 28px 1fr; align-items: center; }
.chal-cell-prob {
  background: #fdf8f5; border-radius: 8px 0 0 8px;
  padding: 11px 12px; font-size: 13px; color: #555; line-height: 1.6;
  display: flex; align-items: flex-start; gap: 7px;
}
.chal-warn {
  flex-shrink: 0; width: 18px; height: 18px; background: #f0a070; color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; margin-top: 1px;
}
.chal-arrow-cell { display: flex; align-items: center; justify-content: center; background: #f5f5f5; align-self: stretch; }
.chal-cell-sol {
  background: #f5fafd; border-radius: 0 8px 8px 0;
  padding: 11px 12px; font-size: 13px; color: #333; line-height: 1.6;
}

/* ── アプローチタブ ── */
.atab-nav {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 10px;
}
.atab-btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 12px;
  background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer;
  white-space: nowrap; transition: background 0.15s; font-size: 12px; color: #555;
}
.atab-btn--active { background: #fff; box-shadow: 0 0 0 1.5px #ddd; color: #222; }
.atab-num {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.atab-icon { width: 15px; height: 15px; }
.atab-icon svg { width: 15px; height: 15px; }
.atab-name { font-weight: 600; }
.atab-panel { animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.atab-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 11px 0; border-top: 1px solid #f0f0f0;
}
.atab-item:first-child { border-top: none; }
.atab-item-num {
  width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.atab-item-body { flex: 1; font-size: 13px; color: #444; line-height: 1.65; }
.atab-item-body strong { color: #1a1a1a; font-weight: 600; }
.atab-cases {
  margin-top: 14px; padding: 12px 14px;
  background: #fafaf8; border-radius: 8px;
}
.atab-cases-label {
  font-size: 10px; font-weight: 700; color: #aaa;
  letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
}
.atab-case { padding: 8px 0; border-top: 1px solid #eee; }
.atab-case:first-child { border-top: none; }
.atab-case-company { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 3px; }

function chevronRight() {
  return `<svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="width:15px;height:15px;flex-shrink:0"><path d="M6 3l5 5-5 5"/></svg>`;
}
function chevronDown(extra) {
  return `<svg class="dr-chev${extra||''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="width:15px;height:15px;flex-shrink:0"><path d="M3 6l5 5 5-5"/></svg>`;
}

function renderSteps(depth, max) {
  let h = '';
  const labels = ['切り口', 'しぼり込み', '課題', '支援内容'];
  for (let i = 0; i < max; i++) {
    const cls = i < depth ? 'done' : i === depth ? 'active' : '';
    h += `<div class="step-dot ${cls}"></div>`;
  }
  h += `<span class="step-label">${labels[Math.min(depth, labels.length-1)]}</span>`;
  document.getElementById('steps').innerHTML = h;
  document.getElementById('back-btn').style.display = depth > 0 ? 'flex' : 'none';
}

function setBreadcrumbs(items) {
  const el = document.getElementById('breadcrumbs');
  if (!items || items.length === 0) { el.className = 'breadcrumbs'; return; }
  el.className = 'breadcrumbs visible';
  el.innerHTML = items.map((t,i) =>
    (i > 0 ? '<span class="bc-sep">›</span>' : '') +
    `<span class="bc-item">${t}</span>`
  ).join('');
}

function setScreen(html) {
  const el = document.getElementById('screen');
  el.innerHTML = `<div class="fade">${html}</div>`;
}

function goRoleSubtype(subtypeIdx) {

function goRoleQuestion(phaseIdx) {
  history.push('role-phase');
  state.phaseIdx = phaseIdx;
  const role = ROLE_DATA[state.roleIdx];
  const subtype = (role.subtypes && state.subtypeIdx !== undefined) ? role.subtypes[state.subtypeIdx] : null;
  const phases = subtype ? subtype.phases : role.phases;
  const phase = phases[phaseIdx];
  renderSteps(3, 4);
  setBreadcrumbs(subtype
    ? ['立場から入る', role.name, subtype.name, phase.tag]
    : ['立場から入る', role.name, phase.tag]);
  setScreen(`
    <div class="prompt">
      <h2>具体的な悩みは？</h2>
    </div>
    <div class="cards">
      ${phase.questions.map((q,i) => `

            <div class="card-title">${q.q}</div>
          </div>
          ${chevronRight()}
        </div>
      `).join('')}
    </div>
  `);
}

function goRoleResult(qIdx) {
  history.push('role-question');
  const role = ROLE_DATA[state.roleIdx];
  const subtype = (role.subtypes && state.subtypeIdx !== undefined) ? role.subtypes[state.subtypeIdx] : null;
  const phases = subtype ? subtype.phases : role.phases;
  const phase = phases[state.phaseIdx];
  const q = phase.questions[qIdx];
  renderSteps(4, 4);
  setBreadcrumbs(subtype
    ? ['立場から入る', role.name, subtype.name, phase.tag]
    : ['立場から入る', role.name, phase.tag]);
  renderResult(q, `「${q.q}」への支援`);
}

function extractPageTerms(d) {
  const allText = [
    d.long,
    ...d.challenges.map(c => c.problem + ' ' + c.solution),
    ...d.approaches,
    ...d.cases.map(c => c.summary),
  ].join(' ');
  const found = new Map(); // key → display label
  for (const [term, key] of TERM_SCAN_MAP) {
    if (allText.includes(term) && !found.has(key)) {
      found.set(key, term);
    }
  }
  return found;
}

function switchApproach(clickedBtn, gidx) {
  const nav = clickedBtn.closest('.atab-nav');
  const color = nav.dataset.color;
  nav.querySelectorAll('.atab-btn').forEach((btn, i) => {
    const active = i === gidx;
    btn.classList.toggle('atab-btn--active', active);
    const num = btn.querySelector('.atab-num');
    num.style.background = active ? color : '#e8e8e8';
    num.style.color = active ? '#fff' : '#999';
  });
  const panelWrap = nav.nextElementSibling;
  panelWrap.querySelectorAll('.atab-panel').forEach((p, i) => {
    p.style.display = i === gidx ? 'block' : 'none';
  });
}

function goDomainDetail(domainIdx) {
  history.push('domain-list');
  state.domainIdx = domainIdx;
  const d = DOMAIN_META[domainIdx];
  renderSteps(2, 3);
  setBreadcrumbs(['事業領域から入る', d.id]);

  // フェーズタイムライン
  const phaseOrder = ['WILL/ENTRY','MVP1','MVP2','SEED','ALPHA','EXIT'];
  const phaseMap = {};
  (d.whenUseful || []).forEach(w => { phaseMap[w.phase] = w; });
  const timelineHTML = phaseOrder.map(ph => {
    const w = phaseMap[ph];
    const score = w ? w.score : '—';
    const isActive = score === '◎' || score === '○';
    return `
      <div class="phase-cell${isActive ? ' phase-cell--active' : ''}" ${w ? `title="${w.note}"` : ''}>
        <div class="phase-score" style="color:${isActive ? d.color : '#aaa'}">${score}</div>
        <div class="phase-label">${ph}</div>
      </div>`;
  }).join('');

  // 課題→解決の2列テーブル
  const challengeHTML = `
    <div class="chal-table">
      <div class="chal-table-head">
        <div class="chal-th-prob">課題</div>
        <div></div>
        <div class="chal-th-sol" style="color:${d.color}">解決策</div>
      </div>
      ${(d.challenges || []).map(c => `
        <div class="chal-row">
          <div class="chal-cell-prob">
            <span class="chal-warn">!</span>
            ${c.problem}
          </div>
          <div class="chal-arrow-cell">
            <svg viewBox="0 0 20 20" fill="${d.color}" width="18" height="18"><path d="M12.293 4.293a1 1 0 0 1 1.414 0l5 5a1 1 0 0 1 0 1.414l-5 5a1 1 0 0 1-1.414-1.414L15.586 11H3a1 1 0 1 1 0-2h12.586l-3.293-3.293a1 1 0 0 1 0-1.414z"/></svg>
          </div>
          <div class="chal-cell-sol">${c.solution}</div>
        </div>`).join('')}
    </div>`;

  // アプローチ：番号タブ＋パネル
  const approachHTML = `
    <div class="atab-nav" data-color="${d.color}">
      ${(d.approachGroups || []).map((g, i) => `
        <button class="atab-btn${i===0 ? ' atab-btn--active' : ''}" onclick="switchApproach(this,${i})">
          <span class="atab-num" style="background:${i===0 ? d.color : '#e8e8e8'};color:${i===0 ? '#fff' : '#999'}">${String(i+1).padStart(2,'0')}</span>
          <span class="atab-icon">${domainIcon(g.icon)}</span>
          <span class="atab-name">${g.name}</span>
        </button>`).join('')}
    </div>
    <div class="atab-panels">
      ${(d.approachGroups || []).map((g, i) => {
        const items = g.indices.map(idx => d.approaches[idx]).filter(Boolean);
        const relCases = (d.cases || []).filter(c => c.tag === g.name);
        return `
          <div class="atab-panel" style="display:${i===0 ? 'block' : 'none'}">
            ${items.map((a, num) => {
              const short = a.replace(/[（(【][\s\S]*/, '').replace(/[：:][\s\S]*/, '').trim() || a.slice(0,35);
              const rest = a.slice(short.length);
              return `
                <div class="atab-item">
                  <div class="atab-item-num" style="color:${d.color};border-color:${d.color}50">${num+1}</div>
                  <div class="atab-item-body"><strong>${short}</strong>${rest}</div>
                </div>`;
            }).join('')}
            ${relCases.length ? `
              <div class="atab-cases">
                <div class="atab-cases-label">関連事例</div>
                ${relCases.map(c => `
                  <div class="atab-case">
                    <div class="atab-case-company">${c.company}</div>
                    <div class="atab-case-summary">${c.summary}</div>
                    ${c.url ? `<a href="${c.url}" target="_blank" rel="noopener noreferrer" class="atab-case-link" style="color:${d.color}">詳細を見る →</a>` : ''}
                  </div>`).join('')}
              </div>` : ''}
          </div>`;
      }).join('')}
    </div>`;

  // ドメイン関係カード
  const relations = DOMAIN_RELATIONS[d.id] || [];
  const relHTML = relations.map(r => {
    const rel = DOMAIN_META.find(m => m.id === r.id);
    if (!rel) return '';
    return `
      <div class="domrel-card" onclick="goDomainDetail(${DOMAIN_META.indexOf(rel)})">
        <div class="domrel-dot" style="background:${rel.color}"></div>
        <div class="domrel-body">
          <div class="domrel-id" style="color:${rel.color}">${rel.id}</div>
          <div class="domrel-rel">${r.rel}</div>
        </div>
        <svg class="domrel-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3l5 5-5 5"/></svg>
      </div>`;
  }).join('');

  // 支援事例
  const caseHTML = (d.cases || []).map(c => `
    <div class="case-card">
      <div class="case-card-header">
        <span class="case-company">${c.company}</span>
        <span class="case-tag" style="background:${d.color}20;color:${d.color}">${c.tag}</span>
      </div>
      <div class="case-summary">${c.summary}</div>
      ${c.url ? `<div style="margin-top:6px"><a href="${c.url}" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:${d.color};text-decoration:none;font-weight:600;">詳細を見る →</a></div>` : ''}
    </div>`).join('');

  // 用語チップ
  const terms = extractPageTerms(d);
  const termHTML = terms.size === 0 ? '' : `
    <div class="domain-section">
      <div class="domain-section-title" style="border-color:${d.color}">このページの用語</div>
      <div class="concept-chips" style="margin-bottom:4px">
        ${[...terms.entries()].map(([key, label]) =>
          `<span class="concept-chip" onclick="openADDict('${key.replace(/'/g,"\\'")}'">${label}</span>`
        ).join('')}
      </div>
    </div>`;

  setScreen(`
    <div class="domain-detail-header" style="background:${d.color}">
      <div class="ddh-name">${d.id}</div>
      <div class="ddh-desc">${d.long}</div>
    </div>

    <div class="domain-section">
      <div class="domain-section-title" style="border-color:${d.color}">活躍するフェーズ</div>
      <div class="phase-timeline">${timelineHTML}</div>
    </div>

    <div class="domain-section">
      <div class="domain-section-title" style="border-color:${d.color}">解決できる課題</div>
      ${challengeHTML}
    </div>

    <div class="domain-section">
      <div class="domain-section-title" style="border-color:${d.color}">支援アプローチ</div>
      ${approachHTML}
    </div>

    ${relHTML ? `
    <div class="domain-section">
      <div class="domain-section-title" style="border-color:${d.color}">他の事業部との連携</div>
      <div class="domrel-list">${relHTML}</div>
    </div>` : ''}

    <div class="domain-section">
      <div class="domain-section-title" style="border-color:${d.color}">支援事例</div>
      <div class="case-cards">${caseHTML}</div>
    </div>

    ${termHTML}

    <button class="restart-btn" onclick="goDetailEntry()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="width:15px;height:15px"><path d="M2 8a6 6 0 1 0 .5-2.5"/><path d="M2 3v3h3"/></svg>
      切り口を選び直す
    </button>
  `);
}

function goPhaseEntry() {
  history.push('detail');
  state.entryType = 'phase';
  renderSteps(1, 3);
  setBreadcrumbs(['フェーズ・状況から入る']);

  // group by role
  const groups = [
    { label:'起案者', ids:['will','mvp1','mvp2','seed','alpha','beta'] },
    { label:'統括・事務局', ids:['design','recruit','review','growth','improve'] },
    { label:'経営層', ids:['strategy','invest','culture','revenue','exit'] },
  ];

  let html = `<div class="prompt"><h2>今の状況を選んでください</h2></div>`;
  groups.forEach(g => {
    const phases = ALL_PHASES.filter(p => g.ids.includes(p.id));
    html += `<div class="section-title" style="margin:18px 0 8px">${g.label}</div>`;
    html += `<div class="cards" style="margin-bottom:8px">`;
    phases.forEach((p,i) => {
      const allIdx = ALL_PHASES.indexOf(p);
      html += `<div class="phase-index-card" onclick="goPhaseQuestion(${allIdx})">
        <div style="flex:1">
          <div class="pic-tag">${p.tag}</div>
          <div class="pic-name">${p.name}</div>
          <div class="pic-desc">${p.desc}</div>
          <div class="pic-roles">${p.roles.map(r=>`<span class="pic-role-badge">${r}</span>`).join('')}</div>
        </div>
        ${chevronRight()}
      </div>`;
    });
    html += '</div>';
  });
  setScreen(html);
}

function goPhaseQuestion(phaseAllIdx) {
  history.push('phase-list');
  state.phaseAllIdx = phaseAllIdx;
  const p = ALL_PHASES[phaseAllIdx];

  // collect all questions for this phase across all roles (including subtypes)
  let allQs = [];
  ROLE_DATA.forEach(role => {
    const allPhaseLists = role.subtypes
      ? role.subtypes.map(s => s.phases)
      : [role.phases];
    allPhaseLists.forEach(phases => {
      phases.forEach(ph => {
        if (ph.id === p.id) {
          ph.questions.forEach(q => {
            if (!allQs.find(x => x.q === q.q)) allQs.push(q);
          });
        }
      });
    });
  });

  renderSteps(2, 3);
  setBreadcrumbs(['フェーズ・状況から入る', p.tag]);
  setScreen(`
    <div class="prompt">
      <h2>具体的な悩みは？</h2>
      <p>${p.name}</p>
    </div>
    <div class="cards">
      ${allQs.map((q,i) => `
        <div class="card" onclick="goPhaseResult(${i})">
          <div class="card-body">
            <div class="card-title">${q.q}</div>
          </div>
          ${chevronRight()}
        </div>
      `).join('')}
    </div>
  `);
  state._phaseQs = allQs;
}

function goPhaseResult(qIdx) {
  history.push('phase-question');
  const q = state._phaseQs[qIdx];
  const p = ALL_PHASES[state.phaseAllIdx];
  renderSteps(3, 3);
  setBreadcrumbs(['フェーズ・状況から入る', p.tag]);
  renderResult(q, `「${q.q}」への支援`);
}

// ── 共通：結果画面 ──
function renderResult(q, title) {
  const sorted = [...q.domains].sort((a,b) => b.score - a.score);
  const cards = sorted.map((item, idx) => {
    const color = DOMAIN_META.find(d => d.id === item.d)?.color || '#888';
    const isSub  = item.score === 1;
    const isOpt  = item.score === 0.5;
    const cls    = isSub ? 'score-sub' : isOpt ? 'score-opt' : 'score-main';
    const mark   = item.score === 2 ? '◎' : item.score === 1 ? '○' : '△';
    const level  = SCORE_LABELS[item.score] || '';
    const open   = idx === 0 ? ' open' : '';
    const style  = item.score === 2
      ? `background:${color}`
      : `border-color:${color};color:${color}`;
    return `
      <div class="dr-card">
        <div class="dr-top" onclick="toggleDetail(this)">
          <div class="dr-score ${cls}" style="${style}">${mark}</div>
          <div class="dr-meta">
            <div class="dr-name" style="color:${color}">${item.d}</div>
            <div class="dr-level">${level}</div>
          </div>
          ${chevronDown(open ? ' open' : '')}
        </div>
        <div class="dr-body${open}">
          <div class="dr-section">
            <div class="dr-label">ADのアプローチ</div>
            <div class="dr-text">${item.approach}</div>
          </div>
          <div class="dr-section">
            <div class="dr-label">活用ツール・メニュー</div>
            <div class="dr-text">${item.tools}</div>
          </div>
          <button class="dr-domain-link" style="color:${color};border-color:${color}20;background:${color}08"
            onclick="event.stopPropagation();goDomainDetail(${DOMAIN_META.findIndex(d=>d.id===item.d)})">
            ${item.d} の支援アプローチ・事例を詳しく見る →
          </button>
        </div>
      </div>
    `;
  }).join('');

  setScreen(`
    <div class="result-q">${title}</div>
    <div class="domain-results">${cards}</div>
    <button class="restart-btn" onclick="goDetailEntry()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="width:15px;height:15px"><path d="M2 8a6 6 0 1 0 .5-2.5"/><path d="M2 3v3h3"/></svg>
      切り口を選び直す
    </button>
  `);
}

  el.querySelector('.dr-chev').classList.toggle('open');
}

function goADOverviewEntry() {
  history.push('entry');
  state.entryType = 'ad-overview';
  state.adTab = 0;
  renderSteps(1, 2);
  setBreadcrumbs(['ADの概要を知る']);
  renderADOverviewScreen();
}

function renderADOverviewScreen() {
  const tab = AD_OVERVIEW_TABS[state.adTab];

  const tabs = AD_OVERVIEW_TABS.map((t, i) =>
    `<button class="phase-tab ${i === state.adTab ? 'active' : ''}" onclick="selectADTab(${i})">${t.label}</button>`
  ).join('');

  let body = '';
  const c = tab.content;

  if (tab.id === 'about') {
    const statsHtml = c.stats.map(s => `
      <div style="text-align:center;padding:12px 8px;background:var(--bg);border-radius:10px;flex:1;min-width:90px">
        <div style="font-size:18px;font-weight:800;color:var(--text)">${s.num}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4">${s.label}</div>
      </div>
    `).join('');
    const casesHtml = c.caseExamples.map(e => `<li style="font-size:12px;color:#444;margin-bottom:4px">${e}</li>`).join('');
    body = `
      <div style="background:var(--text);color:#fff;border-radius:12px;padding:16px;margin-bottom:18px">
        <div style="font-size:10px;font-weight:700;letter-spacing:.5px;opacity:.7;margin-bottom:6px">PURPOSE</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:8px">${c.purpose}</div>
        <div style="font-size:12px;opacity:.8;line-height:1.6">${c.headline}</div>
      </div>
      <div style="font-size:13px;color:#444;line-height:1.7;margin-bottom:18px">${c.lead}</div>
      <div class="b-section-label">実績（2026年1月時点）</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${statsHtml}</div>
      <div class="b-section-label">ADが提供する5つのソリューション</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px">${c.solutions.map(s=>`<span style="font-size:12px;font-weight:700;padding:5px 12px;background:var(--text);color:#fff;border-radius:20px">${s}</span>`).join('')}</div>
      <div class="b-section-label">ADの強み</div>
      <div style="font-size:13px;color:#444;line-height:1.7;margin-bottom:18px">${c.strength}</div>
      <div class="b-section-label">事業化・会社化された事例（一部）</div>
      <ul style="padding-left:16px;margin:0 0 24px">${casesHtml}</ul>
    `;
  } else if (tab.id === 'challenges') {
    const challHtml = c.challenges.map(ch => `
      <div style="display:flex;gap:12px;padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px">
        <div style="font-size:22px;flex-shrink:0">${ch.icon}</div>
        <div>
          <div style="font-size:14px;font-weight:700;margin-bottom:4px">${ch.title}</div>
          <div style="font-size:12px;color:#555;line-height:1.6">${ch.desc}</div>
        </div>
      </div>
    `).join('');
    body = `
      <div style="font-size:13px;color:#555;margin-bottom:16px">${c.intro}</div>
      ${challHtml}
    `;
  } else if (tab.id === 'services') {
    const unitsHtml = c.units.map(u => `
      <div style="padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:13px;font-weight:800">${u.name}</div>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;background:var(--bg);border-radius:4px;color:var(--muted);white-space:nowrap">${u.tag}</span>
        </div>
        <div style="font-size:12px;color:#555;line-height:1.6">${u.role}</div>
      </div>
    `).join('');
    body = `
      <div style="font-size:13px;color:#555;margin-bottom:16px">${c.intro}</div>
      ${unitsHtml}
    `;
  } else if (tab.id === 'cases') {
    const casesHtml = c.cases.map(cs => `
      <div style="padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:14px;font-weight:800">${cs.company}</div>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;background:var(--bg);border-radius:4px;color:var(--muted)">${cs.industry}</span>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;background:#eff6ff;border-radius:4px;color:#2563eb">${cs.type}</span>
        </div>
        <div style="font-size:12px;color:#333;font-weight:600;margin-bottom:8px">${cs.theme}</div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:5px">RESULTS</div>
        <ul style="padding-left:14px;margin:0 0 10px">${cs.results.map(r => `<li style="font-size:12px;color:#444;margin-bottom:3px">${r}</li>`).join('')}</ul>
        <div style="font-size:12px;color:#555;background:var(--bg);padding:8px 10px;border-radius:6px;line-height:1.6">${cs.point}</div>
      </div>
    `).join('');
    body = `
      <div style="font-size:13px;color:#555;margin-bottom:16px">${c.intro}</div>
      ${casesHtml}
    `;
  }

  setScreen(`
    <div class="fade">
      <div class="phase-tabs">${tabs}</div>
      ${body}
    </div>
  `);
}

function selectADTab(idx) {
  state.adTab = idx;
  renderADOverviewScreen();
}

// ─── BASICS FUNCTIONS ─────────────────────────────────────────────

function goBasicsEntry() {
  history.push('entry');
  state.entryType = 'basics';
  state.basicsPhase = 0;
  renderSteps(1, 2);
  setBreadcrumbs(['事業開発の基礎を学ぶ']);
  renderBasicsScreen();
}

function renderBasicsScreen() {
  const phase = BASICS_PHASES[state.basicsPhase];

  const tabs = BASICS_PHASES.map((p, i) =>
    `<button class="phase-tab ${i === state.basicsPhase ? 'active' : ''}" onclick="selectBasicsPhase(${i})">${p.tab}</button>`
  ).join('');

  const myths = phase.myths.map(m => `
    <div class="myth-card" onclick="toggleMyth(this)">
      <div class="myth-top">
        <span class="myth-badge" style="background:#fee2e2;color:#dc2626">誤解</span>
        <span class="myth-text">${m.bad}</span>
      </div>
      <div class="myth-body">
        <div class="myth-row">
          <span class="myth-row-badge">実際は</span>
          <span class="myth-row-text">${m.good}</span>
        </div>
      </div>
    </div>
  `).join('');

  const chips = phase.concepts.map(c =>
    `<span class="concept-chip" onclick="openDict('${c}')">${c}</span>`
  ).join('');

  const actionsHtml = phase.actions ? `
    <div class="b-section-label">このフェーズでやること</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:18px">
      ${phase.actions.map((a, i) => `
        <div style="display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#333;line-height:1.6">
          <span style="flex-shrink:0;width:20px;height:20px;border-radius:50%;background:#2563eb;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">${i+1}</span>
          <span>${a}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  const criteriaHtml = phase.criteria ? `
    <div class="b-section-label">次フェーズへの通過基準</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:18px">
      ${phase.criteria.map(c => `
        <div style="display:flex;gap:8px;align-items:flex-start;font-size:13px;color:#333;line-height:1.6">
          <span style="flex-shrink:0;color:#16a34a;font-size:14px;margin-top:1px">✓</span>
          <span>${c}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  const strugglesHtml = phase.struggles ? `
    <div class="b-section-label">よくある詰まりどころ</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:18px">
      ${phase.struggles.map(s => `
        <div style="display:flex;gap:8px;align-items:flex-start;font-size:13px;color:#333;line-height:1.6">
          <span style="flex-shrink:0;color:#dc2626;font-size:14px;margin-top:1px">⚠</span>
          <span>${s}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  setScreen(`
    <div class="fade">
      <div class="phase-tabs">${tabs}</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div class="bph-phase" style="margin-bottom:0">${phase.tab}</div>
        ${phase.duration ? `<div style="font-size:11px;color:#666;background:#f3f4f6;padding:2px 8px;border-radius:20px">目安 ${phase.duration}</div>` : ''}
      </div>
      <div class="bph-name">${phase.name}</div>
      <div class="bph-desc">${phase.desc}</div>
      <div class="bph-focus"><strong>このフェーズの焦点</strong>${phase.focus}</div>
      ${actionsHtml}
      ${criteriaHtml}
      ${strugglesHtml}
      ${phase.myths.length > 0 ? `
        <div class="b-section-label">よくある誤解（クリックで解説）</div>
        <div class="myth-list">${myths}</div>
      ` : ''}
      <div class="b-section-label">このフェーズのキーワード</div>
      <div class="concept-chips">${chips}</div>
    </div>
  `);
}

function selectBasicsPhase(idx) {
  state.basicsPhase = idx;
  renderBasicsScreen();
}

function toggleMyth(el) {
  el.querySelector('.myth-body').classList.toggle('open');
}

function openDict(term) {
  const entry = DICTIONARY[term] || AD_DICTIONARY[term];
  if (!entry) return;
  document.getElementById('dict-term').textContent = term;
  document.getElementById('dict-def').textContent = entry.def;
  const egEl = document.getElementById('dict-eg');
  egEl.innerHTML = entry.eg ? `<strong>例</strong>${entry.eg}` : '';
  egEl.style.display = entry.eg ? '' : 'none';
  document.getElementById('dict-overlay').classList.add('open');
}

function openADDict(term) {
  openDict(term);
}

function closeDict() {
  document.getElementById('dict-overlay').classList.remove('open');
}

function goBack() {
  const prev = history.pop();
  if (!prev || prev === 'entry') { renderEntry(); return; }
  if (prev === 'detail') { goDetailEntry(); return; }

  if (state.entryType === 'role') {
    if (prev === 'role-question') { goRolePhase(state.phaseIdx); state.phaseIdx = undefined; }
    else if (prev === 'role-phase') { goRoleEntry(); state.roleIdx = undefined; }
    else { goDetailEntry(); }
  } else if (state.entryType === 'domain') {
    if (prev === 'domain-list') { goDomainEntry(); }
    else { goDetailEntry(); }
  } else if (state.entryType === 'challenge') {
    if (prev === 'challenge-question') { goChallengeQuestions(state.challengeCatIdx); }
    else if (prev === 'challenge-list') { goChallengeEntry(); state.challengeCatIdx = undefined; }
    else { goDetailEntry(); }
  } else if (state.entryType === 'phase') {
    if (prev === 'phase-question') { goPhaseQuestion(state.phaseAllIdx); }
    else if (prev === 'phase-list') { goPhaseEntry(); }
    else { goDetailEntry(); }
  } else if (state.entryType === 'basics') {
    renderEntry();
  } else if (state.entryType === 'ad-overview') {
    renderEntry();
  } else if (state.entryType === 'detail') {
    renderEntry();
  } else {
    renderEntry();
  }
}

// Init
renderEntry();
</script>
